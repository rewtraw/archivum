name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app (Apple Silicon)
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
          CFLAGS: "-mmacosx-version-min=11.0"
          CXXFLAGS: "-mmacosx-version-min=11.0"
        run: npx tauri build --target aarch64-apple-darwin

      - name: Build Tauri app (Intel)
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
          CFLAGS: "-mmacosx-version-min=11.0"
          CXXFLAGS: "-mmacosx-version-min=11.0"
        run: npx tauri build --target x86_64-apple-darwin

      - name: Collect artifacts
        run: |
          mkdir -p release
          cp src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg release/ 2>/dev/null || true
          cp src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg release/ 2>/dev/null || true
          cp src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz release/ 2>/dev/null || true
          cp src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz release/ 2>/dev/null || true
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: release/*
          draft: false
          generate_release_notes: true

      - name: Upload artifacts (non-tag builds)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: archivum-macos
          path: release/*
